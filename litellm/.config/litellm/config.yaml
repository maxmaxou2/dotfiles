model_list:
  # ── Vertex AI (existing) ──────────────────────────────────────────
  - model_name: gemini-flash
    litellm_params:
      model: vertex_ai/gemini-2.5-flash
      vertex_project: jayn-dev
      vertex_location: europe-west4
      vertex_credentials: /Users/maxence/.config/litellm/vertex-sa.json
      reasoning_effort: disable
  - model_name: gemini-3-pro
    litellm_params:
      model: vertex_ai/gemini-3.1-pro-preview
      vertex_project: jayn-dev
      vertex_location: global
      vertex_credentials: /Users/maxence/.config/litellm/vertex-sa.json
  - model_name: vertex-embed
    litellm_params:
      model: vertex_ai/gemini-embedding-2
      vertex_project: jayn-dev
      vertex_location: global
      vertex_credentials: /Users/maxence/.config/litellm/vertex-sa.json
      dimensions: 768

  # ── GitHub Copilot ──────────────────────────────────────────────
  # Token sourced from ~/.config/github-copilot/apps.json (ghu_...).
  # Older installs use hosts.json; LiteLLM checks both.
  # Pricing ($/MTok): input / cache-read / cache-write / output
  - model_name: copilot-sonnet
    litellm_params:
      model: github_copilot/claude-sonnet-4.6
      api_key: "os.environ/GITHUB_TOKEN"
      input_cost_per_token: 0.000003           # $3.00/MTok
      output_cost_per_token: 0.000015          # $15.00/MTok
      cache_read_input_token_cost: 0.0000003   # $0.30/MTok
      cache_creation_input_token_cost: 0.00000375  # $3.75/MTok
  - model_name: copilot-opus
    litellm_params:
      model: github_copilot/claude-opus-4.8
      api_key: "os.environ/GITHUB_TOKEN"
      input_cost_per_token: 0.000005           # $5.00/MTok
      output_cost_per_token: 0.000025          # $25.00/MTok
      cache_read_input_token_cost: 0.0000005   # $0.50/MTok
      cache_creation_input_token_cost: 0.00000625  # $6.25/MTok
  - model_name: copilot-haiku
    litellm_params:
      model: github_copilot/claude-haiku-4.5
      api_key: "os.environ/GITHUB_TOKEN"
      input_cost_per_token: 0.000001           # $1.00/MTok
      output_cost_per_token: 0.000005          # $5.00/MTok
      cache_read_input_token_cost: 0.0000001   # $0.10/MTok
      cache_creation_input_token_cost: 0.00000125  # $1.25/MTok

  # ── Opencode Go (openai-compatible) ────────────────────────────
  # Requires OPENCODE_API_KEY in the environment.
  - model_name: deepseek-v4-flash
    litellm_params:
      model: openai/deepseek-v4-flash
      api_base: https://opencode.ai/zen/go/v1
      api_key: "os.environ/OPENCODE_API_KEY"

litellm_settings:
  drop_params: true
general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"
  database_url: postgresql://maxence@localhost:5432/litellm
